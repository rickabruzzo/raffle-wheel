<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raffle wheel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="assets/honeycomb-logo.svg" alt="Honeycomb" />
      <span class="divider" aria-hidden="true">│</span>
      <input id="confName" class="conf-name" type="text" placeholder="Conference name" aria-label="Conference name" />
    </div>
    <div class="topbar-actions">
      <button id="setupBtn" type="button" hidden>Setup</button>
      <button id="completeBtn" class="danger" type="button" hidden>Raffle complete</button>
    </div>
  </header>

  <div id="message" class="message" hidden></div>

  <section id="setup" class="setup">
    <h2>Set up the raffle</h2>
    <label class="field">
      <span>Prize title</span>
      <input id="prizeTitle" type="text" placeholder="e.g. Sphero BOLT robot" />
    </label>
    <label class="field">
      <span>Prize image — optional, transparent PNG</span>
      <input id="prizeImg" type="file" accept="image/*" />
    </label>
    <label class="field">
      <span>Entrants spreadsheet (.ods)</span>
      <input id="odsFile" type="file" accept=".ods,application/vnd.oasis.opendocument.spreadsheet" />
    </label>
    <p class="hint">
      The file needs columns for First name, Last name, Company, and Email. Email is
      used only to drop duplicates and <code>@honeycomb.io</code> entries — it is never shown.
    </p>
  </section>

  <main id="draw" class="draw" hidden>
    <div id="prizePanel" class="prize" hidden>
      <img id="prizeImgView" class="prize-img" alt="" hidden />
      <div class="prize-text">
        <div class="prize-label">Prize</div>
        <div id="prizeTitleView" class="prize-title"></div>
      </div>
    </div>

    <div class="wheel-wrap">
      <canvas id="wheel" width="600" height="600" aria-label="Raffle wheel"></canvas>
      <div class="pointer" aria-hidden="true"></div>
      <div class="hub" aria-hidden="true"></div>
      <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>
    </div>

    <div id="remaining" class="remaining"></div>
    <button id="spinBtn" class="spin-btn" type="button">Spin the wheel</button>
    <div id="winner" aria-live="polite"></div>
    <div id="controls" class="controls" hidden>
      <button id="notHereBtn" type="button">Not here — remove &amp; spin again</button>
    </div>
  </main>

  <script src="vendor/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
